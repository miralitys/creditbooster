services:
  - type: web
    name: creditbooster
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GHL_WEBHOOK_URL
        sync: false
      - key: GHL_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: LEADS_DB_PATH
        sync: false
